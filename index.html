<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alrededor de los EE.UU.</title>
    <meta name="description" content="Alrededor de los EE.UU." />
    <meta name="author" content="Paula Hernandez" />
    <meta name="keywords" content="Alrededor de los EE.UU." />
    <link rel="normalize" href="./fonts/normalize.css" />
    <link rel="stylesheet" href="./page/index.css" />
    <link rel="icon" href=" " />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img
          class="header__picture"
          src="./images/header.png"
          alt="Around the U.S."
        />
        <hr class="header__line" />
      </header>
      <main class="content">
        <section class="profile">
          <div class="profile__info">
            <div class="profile__picture">
              <img
                class="profile__img-picture"
                src="./images/profile_picture.jpg"
                alt="Foto de perfil"
              />
              <button class="profile__edit-picture"></button>
            </div>
            <div class="profile__description">
              <h1 class="profile__name">Jacques Cousteau</h1>
              <button class="profile__edit-button" type="button"></button>
              <p class="profile__about-me">Explorador</p>
            </div>
          </div>
          <button class="profile__add-button" type="button">
            <img src="./images/add-button.png" alt="Agregar" />
          </button>
        </section>
        <section class="cards content__places">
          <ul class="cards__list"></ul>
        </section>
        <template id="card__template">
          <li class="card">
            <img class="card__picture" alt="" src="#" />
            <button
              aria-label="Delete card"
              class="card__delete-button"
              type="button"
            ></button>
            <div class="card__name">
              <h2 class="card__title"></h2>
              <button
                aria-label="like card"
                class="card__like-button"
                type="button"
              ></button>
            </div>
          </li>
        </template>
      </main>
      <footer class="footer">© 2024 Around The U.S.</footer>
    </div>
    <div class="popup" id="popup-profile">
      <div class="popup__content">
        <button
          aria-label="close popup"
          class="popup__close"
          type="button"
          id="popup-profile-close"
        ></button>
        <h3 class="popup__title">Editar perfil</h3>
        <form class="popup__form" id="edit-profile-form" novalidate>
          <input
            id="name-input"
            class="popup__input popup__input_type_name"
            name="name"
            placeholder="Nombre"
            type="text"
            required
            minlength="2"
            maxlength="40"
          />
          <span class="popup__input-error name-input-error"></span>
          <input
            id="description-input"
            class="popup__input popup__input_type_description"
            name="description"
            placeholder="Acerca de mí"
            type="text"
            required
            minlength="2"
            maxlength="200"
          />
          <span class="popup__input-error description-input-error"></span>
          <button class="popup__save" type="submit" disabled>Guardar</button>
        </form>
      </div>
    </div>
    <div class="popup" id="popup-place">
      <div class="popup__content">
        <button
          aria-label="close popup"
          class="popup__close"
          type="button"
          id="popup-place-close"
        ></button>
        <h3 class="popup__title">Nuevo lugar</h3>
        <form class="popup__form" id="edit-card-popup" novalidate>
          <input
            id="card-name"
            class="popup__input popup__input_type_name"
            name="title"
            placeholder="Título"
            type="text"
            required
            minlength="2"
            maxlength="30"
          />
          <span class="popup__input-error card-name-error"></span>
          <input
            id="card-description"
            class="popup__input popup__input_type_description"
            name="picture"
            placeholder="Enlace a la imagen."
            type="url"
            required
          />
          <span class="popup__input-error card-description-error"></span>
          <button class="popup__save" type="submit">Crear</button>
        </form>
      </div>
    </div>
    <div class="popup" id="popup_image">
      <div class="popup__image-card">
        <button
          aria-label="close popup"
          class="popup__close"
          type="button"
        ></button>
        <img class="popup__image-big" alt="" src="#" />
        <p class="popup__image-name"></p>
      </div>
    </div>
    <div class="popup" id="popup_delete">
      <div class="popup__image-content">
        <button
          aria-label="close popup"
          class="popup__close"
          type="button"
        ></button>
        <h3 class="popup__title">¿Estás seguro?</h3>
        <form
          class="popup__form"
          name="confirm-form"
          id="remove-card-form"
          novalidate
        >
          <button type="submit" class="popup__save">Si</button>
        </form>
      </div>
    </div>
    <div class="popup" id="popup-profile-picture">
      <div class="popup__content">
        <button
          aria-label="close popup"
          class="popup__close"
          type="button"
          id="popup-profile-picture-close"
        ></button>
        <h3 class="popup__title">Cambiar foto de perfil</h3>
        <form class="popup__form" id="edit-profile-picture" novalidate>
          <input
            id="card-description"
            class="popup__input popup__input_type_description"
            name="avatar"
            placeholder="Enlace a la imagen."
            type="url"
            required
          />
          <span class="popup__input-error card-description-error"></span>
          <button class="popup__save" type="submit">Guardar</button>
        </form>
      </div>
    </div>
    <script type="module" src="./page/index.js"></script>
  </body>
</html>
